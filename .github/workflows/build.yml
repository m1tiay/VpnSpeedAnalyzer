name: 🔨 Сборка VpnSpeedAnalyzer

# Запускать при: push в main, pull request, ручном запуске, и при создании релиза
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    name: Сборка Release EXE
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Скачиваем код
      - name: 📥 Checkout
        uses: actions/checkout@v5

      # Устанавливаем .NET
      - name: 🔧 Установка .NET 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Кэшируем NuGet пакеты, чтобы ускорить повторные сборки
      - name: 💾 Кэш NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Проверяем .NET
      - name: ℹ️  Проверка .NET
        run: dotnet --info

      # Восстанавливаем зависимости
      - name: 📚 Восстановление зависимостей
        run: dotnet restore VpnSpeedAnalyzer.csproj

      # Собираем Debug для проверки
      - name: 🔨 Сборка Debug версии
        run: dotnet build VpnSpeedAnalyzer.csproj -c Debug --no-restore

      # Собираем Release EXE (один файл)
      - name: 📦 Публикация Release EXE (standalone)
        run: dotnet publish VpnSpeedAnalyzer.csproj -c Release -r win-x64 --self-contained true -o out

      # Переименовываем бинарник, чтобы в релизе была понятна целевая OS/архитектура
      - name: 🏷️ Переименование EXE под платформу
        shell: pwsh
        run: |
          Move-Item -Path out/VpnSpeedAnalyzer.exe -Destination out/VpnSpeedAnalyzer-win-x64.exe -Force

      # Считаем SHA256 для проверки целостности артефакта
      - name: 🔐 SHA256 артефакта
        shell: pwsh
        run: |
          $hash = Get-FileHash -Algorithm SHA256 -Path out/VpnSpeedAnalyzer-win-x64.exe
          "$($hash.Hash)  VpnSpeedAnalyzer-win-x64.exe" | Out-File -Encoding ASCII out/VpnSpeedAnalyzer-win-x64.exe.sha256
          Get-Content out/VpnSpeedAnalyzer-win-x64.exe.sha256

      # Загружаем артефакт в GitHub Actions
      - name: 📤 Загрузка артефакта
        uses: actions/upload-artifact@v5
        with:
          name: VpnSpeedAnalyzer-Release
          path: |
            out/VpnSpeedAnalyzer-win-x64.exe
            out/VpnSpeedAnalyzer-win-x64.exe.sha256
          retention-days: 30

      # При релизе - добавляем exe + sha256 в релиз GitHub
      - name: 🚀 Добавление EXE в релиз
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/VpnSpeedAnalyzer-win-x64.exe
            out/VpnSpeedAnalyzer-win-x64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
