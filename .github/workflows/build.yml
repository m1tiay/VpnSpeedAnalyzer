name: Build VpnSpeedAnalyzer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET installation
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore VpnSpeedAnalyzer/VpnSpeedAnalyzer.csproj

      - name: Build project
        run: dotnet build VpnSpeedAnalyzer/VpnSpeedAnalyzer.csproj -c Release

      - name: Publish self-contained EXE
        run: dotnet publish VpnSpeedAnalyzer/VpnSpeedAnalyzer.csproj -c Release -r win-x64 --self-contained true -o out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VpnSpeedAnalyzer
          path: out
