name: 🔨 Сборка VpnSpeedAnalyzer

# Запускать при: push в main, pull request, ручном запуске, и при создании релиза
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [created, published]

jobs:
  build:
    runs-on: windows-latest
    name: Сборка Release EXE

    steps:
      # Скачиваем код
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # Устанавливаем .NET
      - name: 🔧 Установка .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Проверяем .NET
      - name: ℹ️  Проверка .NET
        run: dotnet --info

      # Восстанавливаем зависимости
      - name: 📚 Восстановление зависимостей
        run: dotnet restore VpnSpeedAnalyzer.csproj

      # Собираем Debug для проверки
      - name: 🔨 Сборка Debug версии
        run: dotnet build VpnSpeedAnalyzer.csproj -c Debug --no-restore

      # Собираем Release EXE (один файл)
      - name: 📦 Публикация Release EXE (standalone)
        run: dotnet publish VpnSpeedAnalyzer.csproj -c Release -r win-x64 --self-contained true -o out

      # Загружаем артефакт в GitHub Actions
      - name: 📤 Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: VpnSpeedAnalyzer-Release
          path: out/VpnSpeedAnalyzer.exe
          retention-days: 30

      # При релизе - добавляем exe в релиз GitHub
      - name: 🚀 Добавление EXE в релиз
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: out/VpnSpeedAnalyzer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
